<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scott Koo Realty</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a2f5a;
      --navy-light: #243b6e;
      --navy-dark: #0f1d38;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gray: #6b7280;
      --gray-light: #f4f5f7;
      --white: #ffffff;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--gray-light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: var(--white);
      width: 100%;
      max-width: 400px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(26, 47, 90, 0.15), 0 4px 16px rgba(0,0,0,0.08);
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header band */
    .card-header {
      background: var(--navy);
      padding: 32px 28px 24px;
      position: relative;
      overflow: hidden;
    }

    .card-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
    }

    .logo-area {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
    }

    .logo-area img {
      height: 40px;
      filter: brightness(0) invert(1);
      object-fit: contain;
    }

    /* Profile section */
    .profile-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      object-fit: cover;
      flex-shrink: 0;
      background: var(--navy-light);
    }

    .avatar-placeholder {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      background: var(--navy-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 28px;
      color: var(--gold);
      font-family: 'Playfair Display', serif;
    }

    .name-block { flex: 1; }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .title {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--gold-light);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Contact section */
    .card-body {
      padding: 24px 28px;
    }

    .contact-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .contact-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--gray-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 16px;
      height: 16px;
      stroke: var(--navy);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .contact-text {
      display: flex;
      flex-direction: column;
    }

    .contact-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--gray);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 2px;
    }

    .contact-value {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--navy);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-value:hover { color: var(--gold); }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--gray-light);
      margin: 20px 0;
    }

    /* Social links */
    .social-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 20px;
      background: var(--gray-light);
      color: var(--navy);
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.02em;
    }

    .social-btn:hover {
      background: var(--navy);
      color: var(--white);
    }

    .social-btn svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }

    /* Save contact button */
    .card-footer {
      padding: 0 28px 28px;
    }

    .save-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .save-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
    }

    .save-btn:hover { background: var(--navy-light); transform: translateY(-1px); }
    .save-btn:active { transform: translateY(0); }

    .save-btn svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Error / loading */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray);
      font-size: 0.9rem;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="card" id="card">
  <div class="state-msg" id="loading">Loading...</div>

  <div id="content" class="hidden">
    <div class="card-header">
      <div class="logo-area">
        <img src="logo.png" alt="Scott Koo Realty" id="logo" />
      </div>
      <div class="profile-row">
        <div id="avatar-wrap"></div>
        <div class="name-block">
          <div class="name" id="emp-name">—</div>
          <div class="title" id="emp-title">—</div>
        </div>
      </div>
    </div>

    <div class="card-body">
      <ul class="contact-list" id="contact-list"></ul>
      <div class="divider" id="social-divider"></div>
      <div class="social-row" id="social-row"></div>
    </div>

    <div class="card-footer">
      <button class="save-btn" id="save-btn">
        <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save Contact
      </button>
    </div>
  </div>

  <div class="state-msg hidden" id="error">Employee not found.</div>
</div>

<script>
  const SUPABASE_URL = 'https://hxoytsomnidcmmgqtlhh.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh4b3l0c29tbmlkY21tZ3F0bGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTM3MzcsImV4cCI6MjA5MjYyOTczN30.A4KhneX9j8woxF_f0hmLuAmMKARuzHQRSuPkhRkFMRQ';

  const params = new URLSearchParams(window.location.search);
  const slug = params.get('id');

  async function load() {
    if (!slug) { showError(); return; }

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/employees?slug=eq.${slug}&select=*`,
      { headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` } }
    );
    const data = await res.json();
    if (!data.length) { showError(); return; }
    render(data[0]);
  }

  function render(e) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');
    document.title = `${e.name} — Scott Koo Realty`;

    document.getElementById('emp-name').textContent = e.name;
    document.getElementById('emp-title').textContent = e.title || '';

    // Avatar
    const wrap = document.getElementById('avatar-wrap');
    if (e.photo_url) {
      wrap.innerHTML = `<img class="avatar" src="${e.photo_url}" alt="${e.name}" />`;
    } else {
      wrap.innerHTML = `<div class="avatar-placeholder">${e.name.charAt(0)}</div>`;
    }

    // Contacts
    const list = document.getElementById('contact-list');
    const contacts = [
      { label: 'Phone', value: e.phone, href: `tel:${e.phone}`, icon: phoneSVG() },
      { label: 'Email', value: e.email, href: `mailto:${e.email}`, icon: emailSVG() },
    ];
    contacts.forEach(c => {
      if (!c.value) return;
      list.innerHTML += `
        <li class="contact-item">
          <div class="contact-icon">${c.icon}</div>
          <div class="contact-text">
            <span class="contact-label">${c.label}</span>
            <a class="contact-value" href="${c.href}">${c.value}</a>
          </div>
        </li>`;
    });

    // Social
    const socials = [];
    if (e.linkedin) socials.push({ label: 'LinkedIn', href: e.linkedin, icon: linkedinSVG() });
    if (e.instagram) socials.push({ label: 'Instagram', href: e.instagram, icon: instagramSVG() });

    const row = document.getElementById('social-row');
    const divider = document.getElementById('social-divider');
    if (socials.length) {
      socials.forEach(s => {
        row.innerHTML += `<a class="social-btn" href="${s.href}" target="_blank">${s.icon}${s.label}</a>`;
      });
    } else {
      divider.classList.add('hidden');
      row.classList.add('hidden');
    }

    // Save contact
    document.getElementById('save-btn').addEventListener('click', () => saveVCard(e));
  }

  function saveVCard(e) {
    const nameParts = e.name.trim().split(/\s+/);
    const lastName = nameParts.length > 1 ? nameParts.slice(1).join(' ') : '';
    const firstName = nameParts[0];
    const vcard = [
      'BEGIN:VCARD', 'VERSION:3.0',
      `FN:${e.name}`,
      `N:${lastName};${firstName};;;`,
      e.title ? `TITLE:${e.title}` : '',
      e.email ? `EMAIL:${e.email}` : '',
      e.phone ? `TEL;TYPE=CELL:${e.phone}` : '',
      'ORG:Scott Koo Realty',
      'END:VCARD'
    ].filter(Boolean).join('\r\n');

    const blob = new Blob([vcard], { type: 'text/vcard' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${e.name.replace(/\s+/g, '_')}.vcf`;
    a.click();
  }

  function showError() {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error').classList.remove('hidden');
  }

  function phoneSVG() {
    return `<svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>`;
  }
  function emailSVG() {
    return `<svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`;
  }
  function linkedinSVG() {
    return `<svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>`;
  }
  function instagramSVG() {
    return `<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>`;
  }

  load();
</script>
</body>
</html>
